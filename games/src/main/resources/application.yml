spring:
  application:
    name: games
  # 主从数据源配置 - 实现读写分离
  # 注意：如果没有配置 MySQL 主从复制，主从库暂时指向同一个数据库
  datasource:
    # 主库配置 - 写操作
    master:
      jdbc-url: jdbc:postgresql://ep-green-snow-a1hvyx4e-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require
      username: neondb_owner
      password: ${DB_PASSWORD:ENC(LG9IQBA0kcin4Bbbg1WSpOvaRV/jCdLg+5YQKpW8yBsVL+sl6PvpRX8mAGsZhihJXPvgPpPMzI3xu8CKuRUm4Q==)}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 200
        minimum-idle: 30
        connection-timeout: 3000
        idle-timeout: 300000
        pool-name: MasterHikariPool

    # 从库配置 - 读操作
    slave:
      jdbc-url: jdbc:postgresql://ep-green-snow-a1hvyx4e-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require
      username: neondb_owner
      password: ${DB_PASSWORD:ENC(LG9IQBA0kcin4Bbbg1WSpOvaRV/jCdLg+5YQKpW8yBsVL+sl6PvpRX8mAGsZhihJXPvgPpPMzI3xu8CKuRUm4Q==)}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 300
        minimum-idle: 50
        connection-timeout: 3000
        idle-timeout: 300000
        pool-name: SlaveHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: 127.0.0.1 # sweet-sloth-56657.upstash.io
      port: 6379
      # username: default
      # password: ${REDIS_PASSWORD:ENC(UpFVasnn6PJ2lOAJgcG5xuqqrr1KYYq6iUaHYLTEfX0cvs/EKHeXY/WG3TMURzWbROR09CwapCOGDDA+wuCgFFKtfAyAZ3H9imgR1Qqt/bE+b+0l3sEiGnIS+WgxdHDR)}
      database: 0
      timeout: 3000ms
      ssl:
        enabled: false   # 🔥 Upstash 必須開
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 20
          max-wait: 1000ms

# Jasypt 加密配置
# 啟動時需設定環境變數: JASYPT_ENCRYPTOR_PASSWORD=你的加密密鑰
# 或使用 JVM 參數: -Djasypt.encryptor.password=你的加密密鑰
jasypt:
  encryptor:
    bean: jasyptStringEncryptor
server:
  port: 8080
  machine-id: 1

# CORS 跨域設定
# 正式環境請明確指定前端網址，勿使用 "*"
# 範例：cors.allowed-origins=https://www.example.com,https://admin.example.com
cors:
  allowed-origins:
    - "*"

jwt:
  secret: ${JWT_SECRET:ENC(cNXSyWjlh1/fLaYZXOc9jciCzU2tiT4+vcdoT8qh+ZfkBCeCG+hybXxqFgCYdri03glBQ+sFrRqMe3btE9LvWbAQdtZOHb6CCHKpWjJ7cmdIzX/2tseSepBNEkYjv2rnkNk7JvGg//9GIa89tb02Tg==)}
  expiration: 86400000 # 24 hours in milliseconds

# 會員註冊時的初始餘額設定
register:
  games-initial-balance: 200
  sport-initial-balance: 100

# RocketMQ Configuration
rocketmq:
  name-server: localhost:9876
  producer:
    group: games-producer
    send-message-timeout: 3000
    compress-message-body-threshold: 4096
    max-message-size: 4194304
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  consumer:
    group: games-consumer
    transaction-group: games-transaction-consumer
    sport-transaction-group: sport-transaction-consumer
    rtp-group: rtp-consumer

# Resilience4j Rate Limiter Configuration
resilience4j:
  ratelimiter:
    instances:
      spin:
        limit-for-period: 10  # 每個時間窗口允許10個請求
        limit-refresh-period: 1s  # 時間窗口1秒
        timeout-duration: 0s  # 不等待，立即返回
      gamesDeposit:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 0s
      gamesWithdraw:
        limit-for-period: 3
        limit-refresh-period: 1s
        timeout-duration: 0s
      oddsFormatUpdateStatus:
        limit-for-period: 3
        limit-refresh-period: 1s
        timeout-duration: 0s
      sportDeposit:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 0s
      sportWithdraw:
        limit-for-period: 3
        limit-refresh-period: 1s
        timeout-duration: 0s
      # 爬蟲接口頻率限制
      crawlerLeagues:
        limit-for-period: 60
        limit-refresh-period: 60s
        timeout-duration: 0s
      crawlerTeams:
        limit-for-period: 60
        limit-refresh-period: 60s
        timeout-duration: 0s
      crawlerEvents:
        limit-for-period: 120
        limit-refresh-period: 60s
        timeout-duration: 0s
      crawlerMarketLines:
        limit-for-period: 300
        limit-refresh-period: 60s
        timeout-duration: 0s

# Actuator for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,ratelimiters
  endpoint:
    health:
      show-details: always

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # 按標籤排序
    tags-sorter: alpha
    # 按方法排序
    operations-sorter: alpha
    # 顯示請求時間
    display-request-duration: true
    # 預設展開深度
    doc-expansion: none
    # 過濾操作
    filter: true
  # 掃描的套件
  packages-to-scan: com.games.controller
  # 顯示 actuator 端點
  show-actuator: false

