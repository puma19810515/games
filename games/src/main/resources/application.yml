spring:
  application:
    name: games
  # 主从数据源配置 - 实现读写分离
  # 注意：如果没有配置 MySQL 主从复制，主从库暂时指向同一个数据库
  datasource:
    # 主库配置 - 写操作
    master:
      jdbc-url: jdbc:postgresql://ep-green-snow-a1hvyx4e-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require
      username: neondb_owner
      password: npg_rvi4syEgn7qU
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 200
        minimum-idle: 30
        connection-timeout: 3000
        idle-timeout: 300000
        pool-name: MasterHikariPool

    # 从库配置 - 读操作
    slave:
      jdbc-url: jdbc:postgresql://ep-green-snow-a1hvyx4e-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require
      username: neondb_owner
      password: npg_rvi4syEgn7qU
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 300
        minimum-idle: 50
        connection-timeout: 3000
        idle-timeout: 300000
        pool-name: SlaveHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: sweet-sloth-56657.upstash.io
      port: 6379
      username: default
      password: Ad1RAAIncDIxN2UyMDIzYTgyNTU0ZDRhODhiZmI4YWE1ZDk1YTg4MnAyNTY2NTc
      database: 0
      timeout: 3000ms
      ssl:
        enabled: true   # 🔥 Upstash 必須開
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 20
          max-wait: 1000ms
server:
  port: 8080
  machine-id: 1

jwt:
  secret: GamesSuperSecretKeyForJWTTokenGenerationPumaMustBeAtLeast256BitsLong123456789
  expiration: 86400000 # 24 hours in milliseconds

# 會員註冊時的初始餘額設定
register:
  initial-balance: 100000

# RocketMQ Configuration
rocketmq:
  name-server: localhost:9876
  producer:
    group: slot-game-producer
    send-message-timeout: 3000
    compress-message-body-threshold: 4096
    max-message-size: 4194304
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  consumer:
    group: slot-game-consumer

# Resilience4j Rate Limiter Configuration
resilience4j:
  ratelimiter:
    instances:
      spin:
        limit-for-period: 10  # 每個時間窗口允許10個請求
        limit-refresh-period: 1s  # 時間窗口1秒
        timeout-duration: 0s  # 不等待，立即返回
      deposit:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 0s
      withdraw:
        limit-for-period: 3
        limit-refresh-period: 1s
        timeout-duration: 0s

# Actuator for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,ratelimiters
  endpoint:
    health:
      show-details: always
